<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- SEO Meta Tags -->
    <title>Корзина — PC Morph | Оформление заказа</title>
    <meta name="description" content="Ваша корзина покупок в PC Morph. Оформите заказ на игровые ПК и рабочие станции. Быстрая доставка по России. Гарантия 3 года.">
    <meta name="keywords" content="корзина, оформить заказ, купить игровой ПК, корзина PC Morph, заказ компьютера">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Корзина — PC Morph">
    <meta property="og:description" content="Ваша корзина покупок. Оформите заказ на мощный игровой ПК.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://pcmorph.ru/cart.html">
    
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header__inner">
                <a href="index.html" class="logo"><svg width="26" height="26" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-right:8px;vertical-align:middle;display:inline-block;"><rect x="2" y="6" width="24" height="16" rx="2" fill="#b8e600"/><rect x="5" y="9" width="18" height="10" rx="1" fill="#0d0d0d"/><circle cx="20" cy="20" r="3" fill="#e65c00"/><circle cx="20" cy="20" r="1.5" fill="#0d0d0d"/></svg>PC Morph</a>
                <button class="mobile-menu-btn" id="menuBtn" aria-label="Menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>

    <nav class="mobile-menu" id="mobileMenu">
        <a href="index.html" class="mobile-menu__link">Главная</a>
        <a href="catalog.html" class="mobile-menu__link">Каталог</a>
        <a href="cart.html" class="mobile-menu__link active">Корзина</a>
        <a href="profile.html" class="mobile-menu__link">Профиль</a>
    </nav>

    <main>
        <section class="cart">
            <div class="container">
                <h1 class="page-title">Корзина</h1>
                
                <div class="cart__items" id="cartItems">
                    <div class="cart-item">
                        <div class="cart-item__image"><img src="img/pc-gaming-x1.jpg" alt="Morph Gaming X1" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius-sm);"></div>
                        <div class="cart-item__info">
                            <h3 class="cart-item__name">Morph Gaming X1</h3>
                            <p class="cart-item__specs">RTX 4060, i5-13400F</p>
                            <p class="cart-item__price">85 000 ₽</p>
                        </div>
                        <div class="cart-item__quantity">
                            <button class="quantity-btn" onclick="changeQuantity(-1)">−</button>
                            <span class="quantity-value">1</span>
                            <button class="quantity-btn" onclick="changeQuantity(1)">+</button>
                        </div>
                        <button class="cart-item__remove" onclick="removeItem()" aria-label="Удалить">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"/>
                                <line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                        </button>
                    </div>

                    <div class="cart-item">
                        <div class="cart-item__image"><img src="img/pc-office-elite.jpg" alt="Morph Office Elite" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius-sm);"></div>
                        <div class="cart-item__info">
                            <h3 class="cart-item__name">Morph Office Elite</h3>
                            <p class="cart-item__specs">GTX 1650, i5-12400</p>
                            <p class="cart-item__price">55 000 ₽</p>
                        </div>
                        <div class="cart-item__quantity">
                            <button class="quantity-btn" onclick="changeQuantity(-1)">−</button>
                            <span class="quantity-value">1</span>
                            <button class="quantity-btn" onclick="changeQuantity(1)">+</button>
                        </div>
                        <button class="cart-item__remove" onclick="removeItem()" aria-label="Удалить">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"/>
                                <line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="cart__summary">
                    <div class="cart__row">
                        <span>Товары (2)</span>
                        <span>140 000 ₽</span>
                    </div>
                    <div class="cart__row">
                        <span>Доставка</span>
                        <span class="text-accent">Бесплатно</span>
                    </div>
                    <div class="cart__total">
                        <span>Итого</span>
                        <span class="cart__total-price" id="totalPrice">140 000 ₽</span>
                    </div>
                    <button class="btn btn--primary btn--full" onclick="checkout()">
                        Оформить заказ
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left: 8px;">
                            <line x1="5" y1="12" x2="19" y2="12"/>
                            <polyline points="12 5 19 12 12 19"/>
                        </svg>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav__item">
            <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span class="bottom-nav__label">Главная</span>
        </a>
        <a href="catalog.html" class="bottom-nav__item">
            <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"/>
                <rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/>
                <rect x="3" y="14" width="7" height="7"/>
            </svg>
            <span class="bottom-nav__label">Каталог</span>
        </a>
        <a href="cart.html" class="bottom-nav__item active">
            <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="9" cy="21" r="1"/>
                <circle cx="20" cy="21" r="1"/>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            <span class="bottom-nav__label">Корзина</span>
        </a>
        <a href="profile.html" class="bottom-nav__item">
            <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
            <span class="bottom-nav__label">Профиль</span>
        </a>
    </nav>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 PC Morph. Все права защищены.</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
